name: intern_portal
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.3
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  http: ^1.6.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  shared_preferences: ^2.5.4
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  min_sdk_android: 21
  image_path: "assets/intern.jpeg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/intern.jpeg"

flutter_native_splash:
  android: true
  ios: true
  color: "#0000FF"   
  image: assets/splash_screen.png
  android_12:
    color: "#0000FF"
    image: assets/splash_screen.png

flutter:
  uses-material-design: true
  assets:
    - assets/intern.jpeg
    - assets/splash_screen.png
